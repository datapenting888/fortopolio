<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Components – Buttons</title>
  <link rel="stylesheet" href="assets/css/colors.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .comp-page { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .comp-title { color: var(--text-orange); font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid #2A2A2A; padding-bottom: 0.75rem; }
    .comp-group { margin-bottom: 2rem; }
    .comp-group h3 { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }

    /* Semua varian tombol */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.3rem; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.04em; }
    .btn:active { transform: scale(0.96); }

    .btn-primary   { background: var(--orange-primary); color: #000; }
    .btn-secondary { background: var(--orange-dark);    color: #000; }
    .btn-outline   { background: transparent; border-color: var(--orange-primary); color: var(--text-orange); }
    .btn-ghost     { background: transparent; border-color: #444; color: var(--text-muted); }
    .btn-danger    { background: #EF4444; color: #fff; }
    .btn-success   { background: #22C55E; color: #000; }
    .btn-sm        { padding: 0.3rem 0.8rem; font-size: 0.8rem; border-radius: 6px; }
    .btn-lg        { padding: 0.75rem 2rem; font-size: 1.1rem; border-radius: 12px; }
    .btn-block     { width: 100%; justify-content: center; }

    .btn-primary:hover   { background: var(--orange-dark); }
    .btn-outline:hover   { background: var(--orange-primary); color: #000; }
    .btn-ghost:hover     { background: #222; color: #fff; }
    .btn-danger:hover    { background: #B91C1C; }
    .btn-success:hover   { background: #15803D; }

    code { background: #1F1F1F; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.82rem; color: #aaa; display: block; margin-top: 0.6rem; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
</head>
<body style="background: var(--bg-body); color: var(--text-white);">

<div class="comp-page">
  <h2 class="comp-title">Components — Buttons</h2>

  <div class="comp-group">
    <h3>Tombol Utama</h3>
    <div class="btn-row">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-outline">Outline</button>
      <button class="btn btn-ghost">Ghost</button>
    </div>
    <code>class="btn btn-primary" / btn-secondary / btn-outline / btn-ghost</code>
  </div>

  <div class="comp-group">
    <h3>Status</h3>
    <div class="btn-row">
      <button class="btn btn-success">✔ Berhasil</button>
      <button class="btn btn-danger">✖ Hapus</button>
    </div>
  </div>

  <div class="comp-group">
    <h3>Ukuran</h3>
    <div class="btn-row">
      <button class="btn btn-primary btn-sm">Kecil</button>
      <button class="btn btn-primary">Normal</button>
      <button class="btn btn-primary btn-lg">Besar</button>
    </div>
  </div>

  <div class="comp-group">
    <h3>Izin Keluar / Kembali (sesuai dashboard)</h3>
    <div class="btn-row" style="width:100%; flex-direction: column;">
      <button class="btn btn-primary btn-block btn-lg">↪ IZIN KELUAR</button>
      <button class="btn btn-secondary btn-block btn-lg">↩ KEMBALI MASUK</button>
    </div>
  </div>
</div>

</body>
</html>
