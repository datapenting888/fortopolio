<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Components – Cards</title>
  <link rel="stylesheet" href="assets/css/colors.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    .comp-page { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .comp-title { color: var(--text-orange); font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid #2A2A2A; padding-bottom: 0.75rem; }
    .comp-group { margin-bottom: 2rem; }
    .comp-group h3 { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }

    /* Kartu dasar */
    .card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 14px; padding: 1.25rem; }
    .card-header { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .card-value  { font-size: 1.9rem; font-weight: 700; color: var(--text-white); }
    .card-icon   { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

    /* Kartu berwarna */
    .card-orange { border-color: var(--orange-primary); background: rgba(232,124,30,0.08); }
    .card-orange .card-value { color: var(--text-orange); }
    .card-green  { border-color: var(--green-status); background: rgba(34,197,94,0.08); }
    .card-green  .card-value { color: var(--text-green); }

    /* Kartu status horizontal */
    .card-status-demo { display: flex; align-items: center; gap: 1rem; background: var(--bg-card); border: 1.5px solid var(--green-status); border-radius: 14px; padding: 1rem 1.25rem; }
    .status-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--green-status); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .status-info small { font-size: 0.75rem; color: var(--text-muted); display: block; text-transform: uppercase; }
    .status-info strong { color: var(--text-green); font-size: 1rem; }
  </style>
</head>
<body style="background: var(--bg-body); color: var(--text-white);">

<div class="comp-page">
  <h2 class="comp-title">Components — Cards</h2>

  <div class="comp-group">
    <h3>Kartu Statistik</h3>
    <div class="card-grid">
      <div class="card">
        <span class="card-icon">📋</span>
        <div class="card-header">Total Izin Hari Ini</div>
        <div class="card-value">3</div>
      </div>
      <div class="card card-orange">
        <span class="card-icon">⏱</span>
        <div class="card-header">Sisa Kuota</div>
        <div class="card-value">1</div>
      </div>
      <div class="card card-green">
        <span class="card-icon">✅</span>
        <div class="card-header">Status</div>
        <div class="card-value" style="font-size:1rem; margin-top:0.3rem;">Di Kantor</div>
      </div>
    </div>
  </div>

  <div class="comp-group">
    <h3>Kartu Status (horizontal)</h3>
    <div class="card-status-demo">
      <div class="status-circle">✔</div>
      <div class="status-info">
        <small>Status Saat Ini</small>
        <strong>Sudah Kembali ke Office</strong>
      </div>
    </div>
  </div>

  <div class="comp-group">
    <h3>Kartu Progress</h3>
    <div class="card">
      <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
        <span style="color:var(--text-muted); font-size:0.88rem;"> Sisa Izin</span>
        <span style="font-weight:700;">1 / 4</span>
      </div>
      <div style="background:#333; border-radius:999px; height:10px; overflow:hidden; margin-bottom:0.5rem;">
        <div style="height:100%; width:25%; background:var(--progress-fill); border-radius:999px;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:0.82rem; color:var(--text-muted);">
        <span>✅ Terpakai: <strong style="color:#fff">3</strong></span>
        <span> Kuota: <strong style="color:#fff">4 / hari</strong></span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
